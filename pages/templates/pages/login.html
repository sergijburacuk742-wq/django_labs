<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Вхід в кабінет | StalLine</title>
    <style>
        html, body {
            margin: 0; padding: 0;
            background: linear-gradient(to bottom, #3b3f4c 0%, #22252e 100%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh; display: flex; align-items: center; justify-content: center; color: #f8fafc;
        }

        .auth-container { width: 100%; max-width: 450px; padding: 20px; box-sizing: border-box; text-align: center; }
        .logo a { font-size: 32px; font-weight: 900; letter-spacing: 2px; color: white; text-decoration: none; text-transform: uppercase; margin-bottom: 30px; display: inline-block; }

        .auth-box { background: #2a2d37; padding: 40px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); }
        .auth-box h1 { margin-top: 0; font-size: 1.8em; margin-bottom: 30px; color: white; }

        .auth-form label { display: block; text-align: left; margin-bottom: 8px; color: #cbd5e1; font-weight: 500; font-size: 0.95em; }
        .auth-form input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: #1a1c24; color: white; margin-bottom: 20px; box-sizing: border-box; font-size: 16px; outline: none; transition: 0.3s; }
        .auth-form input:focus { border-color: white; box-shadow: 0 0 10px rgba(255,255,255,0.05); }

        .auth-btn { width: 100%; padding: 16px; background: white; color: #0f172a; border: none; border-radius: 12px; font-size: 1.1em; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .auth-btn:hover { background: #cbd5e1; transform: translateY(-2px); }

        .auth-links { margin-top: 25px; font-size: 0.95em; color: #94a3b8; }
        .auth-links a { color: white; text-decoration: none; font-weight: 600; transition: 0.3s; }
        .auth-links a:hover { color: #cbd5e1; }
        .back-link { display: inline-block; margin-top: 15px; color: #64748b !important; }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="logo"><a href="{% url 'home' %}">STALLINE</a></div>

        <div class="auth-box">
            <h1>З поверненням</h1>

            <form method="POST" class="auth-form">
                {% csrf_token %}
                <label>Логін</label>
                <input type="text" name="username" required placeholder="Введіть ваш логін">

                <label>Пароль</label>
                <input type="password" name="password" required placeholder="Введіть пароль">

                <button type="submit" class="auth-btn">Увійти</button>
            </form>

            <div class="auth-links">
                <p style="margin: 10px 0;">Ще немає акаунту? <a href="{% url 'register' %}">Зареєструватися</a></p>
                <a href="{% url 'home' %}" class="back-link">← На головну</a>
            </div>
        </div>
    </div>

</body>
</html>
