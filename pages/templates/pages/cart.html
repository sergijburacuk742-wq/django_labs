<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>{{ title }}</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; color: #334155; }
        header { background-color: #1e293b; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; }
        header a { color: white; text-decoration: none; font-weight: bold; }
        .container { flex: 1; max-width: 800px; margin: 40px auto; padding: 0 20px; width: 100%; box-sizing: border-box; }
        .cart-item { background: white; padding: 20px; border-radius: 12px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .total { text-align: right; font-size: 1.5em; font-weight: bold; margin: 25px 0; color: #1e293b; }
        .order-form { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; margin-top: 20px; }
        .order-form input { width: 100%; padding: 14px; border-radius: 8px; border: 1px solid #cbd5e1; margin-bottom: 20px; box-sizing: border-box; font-size: 16px; outline: none; transition: 0.3s; }
        .order-form input:focus { border-color: #10b981; }
        .checkout-btn { width: 100%; padding: 16px; background: #10b981; color: white; border: none; border-radius: 12px; font-size: 1.1em; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .checkout-btn:hover { background: #059669; transform: translateY(-2px); }
    </style>
</head>
<body>
    <header>
        <a href="{% url 'home' %}" style="font-size: 24px;">Меблі Волинь</a>
        <a href="{% url 'home' %}">← На головну</a>
    </header>

    <div class="container">
        <h1>🛒 Ваш кошик</h1>
        {% if products %}
            {% for product in products %}
                <div class="cart-item">
                    <div>
                        <h3 style="margin: 0 0 5px 0;">{{ product.title }}</h3>
                        <span style="color: #64748b;">{{ product.category.name }}</span>
                    </div>
                    <h2 style="margin: 0; color: #3b82f6;">{{ product.price }} ₴</h2>
                </div>
            {% endfor %}
            <div class="total">Разом до сплати: <span style="color: #10b981;">{{ total_price }} ₴</span></div>
            <div class="order-form">
                <form action="{% url 'checkout' %}" method="POST">
                    {% csrf_token %}
                    <label style="display:block; margin-bottom:10px; font-weight:bold;">Ваш телефон для підтвердження:</label>
                    <input type="text" name="phone" placeholder="+380XXXXXXXXX" required>
                    <button type="submit" class="checkout-btn">Підтвердити замовлення</button>
                </form>
            </div>
        {% else %}
            <div style="text-align: center; padding: 60px 20px; background: white; border-radius: 12px; border: 1px solid #e2e8f0;">
                <h2>Кошик порожній 😔</h2>
                <a href="{% url 'home' %}" style="display: inline-block; padding: 12px 25px; background: #3b82f6; color: white; text-decoration: none; border-radius: 8px; margin-top: 15px;">Перейти до каталогу</a>
            </div>
        {% endif %}
    </div>
</body>
</html>
